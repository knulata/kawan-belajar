<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tugas - Kawabel Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4CAF50',
            'primary-dark': '#388E3C',
            'primary-light': '#C8E6C9',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-white shadow-lg z-40 transform -translate-x-full lg:translate-x-0 transition-transform">
    <div class="p-6 border-b">
      <div class="flex items-center gap-3">
        <span class="text-3xl">🦉</span>
        <div>
          <h2 class="font-bold text-gray-800" style="font-family: 'Nunito', sans-serif;">Kawabel</h2>
          <p class="text-xs text-gray-500">kawan belajar</p>
        </div>
      </div>
    </div>
    <nav class="p-4 space-y-1">
      <a href="/admin/" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
        Dashboard
      </a>
      <a href="/admin/students.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg>
        Siswa
      </a>
      <a href="/admin/assignments.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-primary text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        Tugas
      </a>
      <a href="/admin/reports.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Laporan
      </a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t">
      <button onclick="logout()" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Keluar
      </button>
    </div>
  </aside>

  <!-- Mobile header -->
  <header class="lg:hidden fixed top-0 left-0 right-0 bg-white shadow z-30 px-4 py-3 flex items-center justify-between">
    <button onclick="toggleSidebar()" class="p-2 rounded-lg hover:bg-gray-100">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="flex items-center gap-2"><span class="text-xl">🦉</span><span class="font-bold text-gray-800">Tugas</span></div>
    <div class="w-10"></div>
  </header>
  <div id="sidebarOverlay" class="fixed inset-0 bg-black/30 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

  <!-- Content -->
  <main class="lg:ml-64 pt-16 lg:pt-0 min-h-screen">
    <div class="p-6 lg:p-8">
      <!-- Header -->
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div>
          <h1 class="text-2xl font-bold text-gray-800">Manajemen Tugas</h1>
          <p class="text-gray-500">Buat dan kelola tugas siswa</p>
        </div>
        <button onclick="showCreateModal()" class="inline-flex items-center gap-2 bg-primary hover:bg-primary-dark text-white font-semibold px-4 py-2 rounded-lg transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Buat Tugas Baru
        </button>
      </div>

      <!-- Tabs -->
      <div class="flex gap-1 mb-6 bg-white rounded-lg p-1 shadow-sm border border-gray-100 w-fit">
        <button onclick="setTab('upcoming')" id="tabUpcoming" class="px-4 py-2 rounded-md text-sm font-medium bg-primary text-white transition">Akan Datang</button>
        <button onclick="setTab('past')" id="tabPast" class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100 transition">Sudah Lewat</button>
        <button onclick="setTab('all')" id="tabAll" class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100 transition">Semua</button>
      </div>

      <!-- Assignments List -->
      <div id="assignmentsList" class="space-y-4">
        <div class="text-gray-400 text-center py-8">Memuat data...</div>
      </div>
    </div>
  </main>

  <!-- Create Assignment Modal -->
  <div id="createModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b flex items-center justify-between">
        <h3 class="text-lg font-bold text-gray-800">Buat Tugas Baru</h3>
        <button onclick="closeCreateModal()" class="p-1 hover:bg-gray-100 rounded-lg">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="createForm" onsubmit="createAssignment(event)" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Judul Tugas</label>
          <input type="text" name="title" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-primary focus:outline-none" placeholder="Contoh: Latihan Perkalian Bab 3">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Mata Pelajaran</label>
            <select name="subject" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-primary focus:outline-none">
              <option value="">Pilih</option>
              <option value="Matematika">Matematika</option>
              <option value="Bahasa Indonesia">Bahasa Indonesia</option>
              <option value="Bahasa Mandarin">Bahasa Mandarin</option>
              <option value="IPA">IPA</option>
              <option value="IPS">IPS</option>
              <option value="English">English</option>
              <option value="PKN">PKN</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Jenis</label>
            <select name="type" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-primary focus:outline-none">
              <option value="">Pilih</option>
              <option value="homework">PR (Pekerjaan Rumah)</option>
              <option value="test">Ujian</option>
              <option value="dictation">Dikte</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Topik</label>
          <input type="text" name="topic" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-primary focus:outline-none" placeholder="Contoh: Perkalian dan Pembagian">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Kelas</label>
            <select name="grade" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-primary focus:outline-none">
              <option value="">Pilih</option>
              <option value="1">Kelas 1</option>
              <option value="2">Kelas 2</option>
              <option value="3">Kelas 3</option>
              <option value="4">Kelas 4</option>
              <option value="5">Kelas 5</option>
              <option value="6">Kelas 6</option>
              <option value="all">Semua Kelas</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tenggat Waktu</label>
            <input type="date" name="dueDate" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-primary focus:outline-none">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Deskripsi (opsional)</label>
          <textarea name="description" rows="3" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-primary focus:outline-none" placeholder="Instruksi tambahan..."></textarea>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeCreateModal()" class="flex-1 border border-gray-300 text-gray-700 py-2 rounded-lg hover:bg-gray-50 transition">Batal</button>
          <button type="submit" class="flex-1 bg-primary hover:bg-primary-dark text-white font-semibold py-2 rounded-lg transition">Simpan Tugas</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Reminder Confirm Modal -->
  <div id="reminderModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl w-full max-w-sm p-6 text-center">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      </div>
      <h3 class="font-bold text-gray-800 mb-2">Kirim Pengingat WhatsApp?</h3>
      <p class="text-sm text-gray-500 mb-1" id="reminderText">Pengingat akan dikirim ke semua orang tua siswa terkait.</p>
      <p class="text-sm text-gray-500 mb-6" id="reminderCount"></p>
      <div class="flex gap-3">
        <button onclick="closeReminderModal()" class="flex-1 border border-gray-300 text-gray-700 py-2 rounded-lg hover:bg-gray-50">Batal</button>
        <button onclick="sendReminder()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg">Kirim</button>
      </div>
    </div>
  </div>

  <script>
    if (sessionStorage.getItem('kb_admin_auth') !== 'true') {
      window.location.href = '/admin/';
    }

    function logout() { sessionStorage.removeItem('kb_admin_auth'); window.location.href = '/admin/'; }
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('sidebarOverlay').classList.toggle('hidden');
    }

    let allAssignments = [];
    let currentTab = 'upcoming';
    let pendingReminderId = null;

    const typeLabels = { homework: 'PR', test: 'Ujian', dictation: 'Dikte' };
    const typeColors = {
      homework: 'bg-blue-100 text-blue-700',
      test: 'bg-red-100 text-red-700',
      dictation: 'bg-purple-100 text-purple-700',
    };

    const fallbackAssignments = [
      { id: 1, title: 'Latihan Perkalian Bab 3', subject: 'Matematika', type: 'homework', topic: 'Perkalian dan Pembagian', grade: 4, dueDate: '2026-03-12', description: 'Kerjakan halaman 45-47', createdAt: '2026-03-08' },
      { id: 2, title: 'Menulis Cerita Pendek', subject: 'Bahasa Indonesia', type: 'homework', topic: 'Menulis Kreatif', grade: 5, dueDate: '2026-03-14', description: 'Minimal 200 kata', createdAt: '2026-03-07' },
      { id: 3, title: 'Ujian Tengah Semester IPA', subject: 'IPA', type: 'test', topic: 'Sistem Tata Surya', grade: 6, dueDate: '2026-03-15', description: 'Bab 1-4', createdAt: '2026-03-05' },
      { id: 4, title: 'Dikte Mandarin Minggu 10', subject: 'Bahasa Mandarin', type: 'dictation', topic: 'Angka dan Warna', grade: 3, dueDate: '2026-03-11', description: '20 karakter', createdAt: '2026-03-08' },
      { id: 5, title: 'English Vocabulary Quiz', subject: 'English', type: 'test', topic: 'Animals & Nature', grade: 4, dueDate: '2026-03-10', description: 'Chapter 5 words', createdAt: '2026-03-06' },
      { id: 6, title: 'PR IPS: Peta Indonesia', subject: 'IPS', type: 'homework', topic: 'Geografi', grade: 5, dueDate: '2026-03-05', description: 'Gambar dan label 5 pulau besar', createdAt: '2026-03-01' },
      { id: 7, title: 'Latihan Penjumlahan', subject: 'Matematika', type: 'homework', topic: 'Penjumlahan', grade: 1, dueDate: '2026-03-03', description: 'Halaman 12-13', createdAt: '2026-02-28' },
    ];

    // Normalize API snake_case to camelCase
    function normAssignment(a) {
      return {
        id: a.id,
        title: a.title,
        subject: a.subject,
        type: a.type,
        topic: a.topic,
        grade: a.grade || 'all',
        dueDate: a.dueDate || a.due_date,
        description: a.description,
        createdAt: a.createdAt || a.created_at,
      };
    }

    async function loadAssignments() {
      try {
        const res = await fetch('/api/assignments');
        if (res.ok) {
          const raw = await res.json();
          allAssignments = raw.map(normAssignment);
        } else {
          allAssignments = fallbackAssignments;
        }
      } catch {
        allAssignments = fallbackAssignments;
      }
      renderAssignments();
    }

    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll('[id^="tab"]').forEach(el => {
        el.className = 'px-4 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100 transition';
      });
      document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).className =
        'px-4 py-2 rounded-md text-sm font-medium bg-primary text-white transition';
      renderAssignments();
    }

    function renderAssignments() {
      const today = new Date().toISOString().split('T')[0];
      let filtered = allAssignments;
      if (currentTab === 'upcoming') filtered = allAssignments.filter(a => a.dueDate >= today);
      if (currentTab === 'past') filtered = allAssignments.filter(a => a.dueDate < today);

      filtered.sort((a, b) => currentTab === 'past' ? b.dueDate.localeCompare(a.dueDate) : a.dueDate.localeCompare(b.dueDate));

      const container = document.getElementById('assignmentsList');
      if (filtered.length === 0) {
        container.innerHTML = '<div class="text-gray-400 text-center py-12">Tidak ada tugas</div>';
        return;
      }

      container.innerHTML = filtered.map(a => {
        const isPast = a.dueDate < today;
        const daysLeft = Math.ceil((new Date(a.dueDate) - new Date(today)) / 86400000);
        let urgency = '';
        if (!isPast && daysLeft <= 1) urgency = '<span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">Besok!</span>';
        else if (!isPast && daysLeft <= 3) urgency = '<span class="text-xs bg-yellow-100 text-yellow-600 px-2 py-0.5 rounded-full">' + daysLeft + ' hari lagi</span>';

        return `
          <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 ${isPast ? 'opacity-70' : ''}">
            <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
              <div class="flex-1">
                <div class="flex flex-wrap items-center gap-2 mb-2">
                  <span class="text-xs font-medium px-2 py-0.5 rounded-full ${typeColors[a.type] || 'bg-gray-100 text-gray-600'}">${typeLabels[a.type] || a.type}</span>
                  <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${a.subject}</span>
                  <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">Kelas ${a.grade === 'all' ? 'Semua' : a.grade}</span>
                  ${urgency}
                </div>
                <h3 class="font-semibold text-gray-800 mb-1">${a.title}</h3>
                ${a.topic ? `<p class="text-sm text-gray-500 mb-1">Topik: ${a.topic}</p>` : ''}
                ${a.description ? `<p class="text-sm text-gray-400">${a.description}</p>` : ''}
              </div>
              <div class="flex flex-col items-end gap-2 shrink-0">
                <p class="text-sm text-gray-500">
                  <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  ${formatDate(a.dueDate)}
                </p>
                ${!isPast ? `
                  <button onclick="confirmReminder(${a.id})" class="inline-flex items-center gap-1 text-sm bg-green-50 text-green-700 hover:bg-green-100 px-3 py-1.5 rounded-lg transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                    Kirim Pengingat
                  </button>
                ` : ''}
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
      return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    function showCreateModal() {
      document.getElementById('createModal').classList.remove('hidden');
      // Set min date to today
      const dateInput = document.querySelector('input[name="dueDate"]');
      dateInput.min = new Date().toISOString().split('T')[0];
    }
    function closeCreateModal() {
      document.getElementById('createModal').classList.add('hidden');
      document.getElementById('createForm').reset();
    }

    async function createAssignment(e) {
      e.preventDefault();
      const form = e.target;
      const data = {
        title: form.title.value,
        subject: form.subject.value,
        type: form.type.value,
        topic: form.topic.value,
        grade: form.grade.value,
        due_date: form.dueDate.value,
        description: form.description.value,
      };

      try {
        const res = await fetch('/api/assignments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          closeCreateModal();
          loadAssignments();
          showToast('Tugas berhasil dibuat!');
          return;
        }
      } catch {}

      // Fallback local
      data.id = Date.now();
      data.createdAt = new Date().toISOString().split('T')[0];
      allAssignments.unshift(data);
      renderAssignments();
      closeCreateModal();
      showToast('Tugas ditambahkan (lokal)');
    }

    function confirmReminder(id) {
      pendingReminderId = id;
      const assignment = allAssignments.find(a => a.id === id);
      document.getElementById('reminderText').textContent =
        `Pengingat untuk "${assignment.title}" akan dikirim via WhatsApp ke orang tua siswa Kelas ${assignment.grade === 'all' ? 'Semua' : assignment.grade}.`;
      document.getElementById('reminderModal').classList.remove('hidden');
    }
    function closeReminderModal() {
      document.getElementById('reminderModal').classList.add('hidden');
      pendingReminderId = null;
    }

    async function sendReminder() {
      const assignment = allAssignments.find(a => a.id === pendingReminderId);
      if (!assignment) return;

      try {
        await fetch('/api/notifications/homework-reminder', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ assignment_id: pendingReminderId }),
        });
      } catch {}

      closeReminderModal();
      showToast('Pengingat WhatsApp terkirim!');
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg z-50 transition-opacity';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
    }

    // Auto-open create if ?action=create
    if (new URLSearchParams(location.search).get('action') === 'create') {
      setTimeout(() => showCreateModal(), 300);
    }

    loadAssignments();
  </script>
</body>
</html>
